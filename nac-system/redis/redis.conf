# ================================================
# Redis Konfigürasyonu
# ================================================
 
# Veri kalıcılığı
save 900 1
save 300 10
save 60  10000
 
# Bellek limiti (gerekirse artır)
maxmemory 256mb
maxmemory-policy allkeys-lru
 
# Log seviyesi
loglevel notice
 
# Veri dizini
dir /data
 