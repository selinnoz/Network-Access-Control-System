Tabii, docker-compose.yml dosyasını satır satır açıklayayım.

Genel yapı
Docker Compose, birden fazla container'ı tek bir dosyadan yönetmeni sağlar. Dosyadaki her service ayrı bir container oluyor. Bizim 4 servisimiz var: postgres, redis, api, freeradius.

Her serviste ortak kavramlar
image — Docker Hub'dan hazır bir image çeker. Mesela postgres:16-alpine demek "PostgreSQL'in 16. versiyonu, Alpine Linux üzerinde" demek. Alpine çok küçük bir Linux dağıtımı, container boyutunu küçük tutar.

build — Hazır image yerine kendi yazdığın Dockerfile'dan image oluşturur. api ve freeradius servisleri bunu kullanıyor çünkü onlara özel konfigürasyon ekleyeceğiz.

container_name — Container'a isim veriyoruz. Vermesek Docker rastgele isim atar, bu şekilde docker logs nac-api gibi komutlarda kolayca bulursun.

env_file: .env — .env dosyasındaki değişkenleri container'a yükler. Şifreleri doğrudan dosyaya yazmak yerine bu şekilde dışarıdan veriyoruz.

environment — Container içinde geçerli olacak ortam değişkenleri. ${POSTGRES_PASSWORD} gibi ifadeler .env dosyasından otomatik doldurulur.

volumes ne işe yarıyor?
İki türlü kullanıyoruz:

postgres_data:/var/lib/postgresql/data — Sol taraf bir Docker volume adı, sağ taraf container içindeki klasör. Container silinse bile veriler kaybolmaz çünkü Docker bu volume'u ayrı saklıyor.

./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql — Sol taraftaki senin bilgisayarındaki dosya, sağ taraf container içine mount edilen yol. PostgreSQL ilk açıldığında docker-entrypoint-initdb.d/ klasöründeki SQL dosyalarını otomatik çalıştırıyor. Tablolar bu sayede kendiliğinden oluşuyor.

networks neden var?
yaml
networks:
  nac-network:
    driver: bridge
Bütün servisler aynı nac-network'e bağlı. Bu sayede servisler birbirini container adıyla bulabiliyor. Mesela FastAPI, PostgreSQL'e bağlanmak için localhost yerine postgres yazıyor — Docker bu ismi otomatik çözüyor. Dışarıdan bu network'e erişemezsin, sadece servisler arası iletişim için var.

depends_on ve healthcheck ilişkisi
yaml
depends_on:
  postgres:
    condition: service_healthy
Bu sadece "postgres başladıktan sonra başla" demek değil, condition: service_healthy diyince "postgres'in healthcheck'i geçene kadar bekle" demek oluyor. Önemli bir fark çünkü container ayağa kalkmış olabilir ama PostgreSQL henüz bağlantı kabul etmiyor olabilir.

Healthcheck ise Docker'ın servisi düzenli aralıklarla yoklaması. Mesela postgres için:

yaml
test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
interval: 10s
timeout: 5s
retries: 5
Her 10 saniyede bir pg_isready komutu çalışıyor. 5 kez üst üste başarısız olursa servis unhealthy sayılıyor.

Port yayınlama
yaml
ports:
  - "8000:8000"
```

Sol taraf senin bilgisayarındaki port, sağ taraf container içindeki port. `http://localhost:8000` dediğinde istek container içindeki 8000 portuna yönleniyor.

FreeRADIUS için `/udp` eklenmiş çünkü RADIUS protokolü UDP kullanıyor, TCP değil.

