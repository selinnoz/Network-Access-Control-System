🗂️ Aşama 1 — Planlama ve Ortam Hazırlığı (30 dk)
Proje klasör yapısını oluştur (nac-system/, altında freeradius/, api/, postgres/, redis/ klasörleri)
.env dosyasını hazırla (DB şifresi, Redis URL, secret'lar)
