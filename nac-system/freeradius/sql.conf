🐘 Aşama 2 — PostgreSQL Kurulumu (45 dk)
init.sql dosyasını yaz: radcheck, radreply, radusergroup, radgroupreply, radacct tablolarını oluştur
Test kullanıcıları ekle (admin, employee, guest grupları)
Password hashing stratejisini belirle (bcrypt veya MD5 — FreeRADIUS uyumlu)
📡 Aşama 3 — FreeRADIUS Konfigürasyonu (2-2.5 saat)
clients.conf — NAS istemcilerini tanımla
sql.conf — PostgreSQL bağlantısını kur
sites-enabled/default — virtual server'ı düzenle: authorize, authenticate, accounting seksiyon
