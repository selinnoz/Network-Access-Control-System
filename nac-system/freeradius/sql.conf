⚡ Aşama 4 — Redis Kurulumu (20 dk)
Redis container'ı ayağa kaldır
Aktif oturum cache yapısını tasarla (key: session:{username}, TTL ayarla)
Rate-limiting için başarısız giriş sayacı tasarla (key: ratelimit:{username}, TTL: 5 dk)
🐍 Aşama 5 — FastAPI Policy Engine (3 saat)
Proje yapısını kur (main.py, models.py, database.py, redis_client.py)
PostgreSQL ve Redis bağlantılarını yaz
/auth endpoint'i — radcheck'e bak, şifreyi doğrula, rate-limit kontrol et
/authorize endpoint'i — kullanıcı grubuna göre VLAN atribütlerini dön
/accounting endpoint'i — radacct'a yaz, Redis'e aktif oturumu kaydet
