Temel olarak birkaç terminal komutu yazıp çıktıyı kaydetmek. Şunları test edeceksin:

1. PAP Authentication — radtest
bash
radtest alice sifre123 localhost 1812 testing123
Beklenen çıktı: Access-Accept veya Access-Reject. Tek satır komut.

2. MAB Testi — radclient
bash
echo "User-Name=AA:BB:CC:DD:EE:FF,
User-Password=AA:BB:CC:DD:EE:FF,
Calling-Station-Id=AA:BB:CC:DD:EE:FF,
NAS-IP-Address=127.0.0.1" | radclient localhost auth testing123
Yine tek komut, MAC adresini değiştirerek bilinen/bilinmeyen MAC testleri yaparsın.

3. Accounting Testi — radclient
bash
# Start paketi
echo "User-Name=alice,
Acct-Status-Type=Start,
Acct-Session-Id=abc123,
NAS-IP-Address=127.0.0.1" | radclient localhost acct testing123

# Stop paketi  
echo "User-Name=alice,
Acct-Status-Type=Stop,
Acct-Session-Id=abc123,
Acct-Session-Time=300" | radclient localhost acct testing123
4. FastAPI Testi — curl
bash
curl -X POST http://localhost:8000/auth \
  -H "Content-Type: application/json" \
  -d '{"username": "alice", "password": "sifre123"}'

curl http://localhost:8000/sessions/active
